<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Tripple Exchange</title>
    <meta name="description" content="Login to your Tripple Exchange account to access secure cryptocurrency trading and mining services">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tripple-exchange.com/login">
    <meta property="og:title" content="Login | Tripple Exchange">
    <meta property="og:description" content="Login to your Tripple Exchange account to access secure cryptocurrency trading and mining services">
    <meta property="og:image" content="https://tripple-exchange.com/social-preview.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://tripple-exchange.com/login">
    <meta property="twitter:title" content="Login | Tripple Exchange">
    <meta property="twitter:description" content="Login to your Tripple Exchange account to access secure cryptocurrency trading and mining services">
    <meta property="twitter:image" content="https://tripple-exchange.com/social-preview.jpg">
    
    <!-- Preload important resources -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style">
    
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root {
            /* Modern Color Palette */
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --primary-light: rgba(67, 97, 238, 0.1);
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --accent: #4cc9f0;
            
            /* Background Colors */
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --surface-lighter: #475569;
            
            /* Text Colors */
            --text: #f8fafc;
            --text-secondary: #e2e8f0;
            --text-muted: #94a3b8;
            
            /* Status Colors */
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            
            /* UI Elements */
            --border: #334155;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --transition: all 0.2s ease;
            
            /* Typography */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* Particles Background */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: var(--bg);
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.5rem;
            border-radius: 6px;
            transition: var(--transition);
            z-index: 10;
        }

        .back-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        .back-btn i {
            margin-right: 0.3rem;
        }

        /* Auth Card */
        .auth-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            position: relative;
        }

        /* Auth Header */
        .auth-header {
            padding: 1.5rem 1.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .auth-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }

        .auth-logo i {
            color: var(--primary);
            font-size: 1.8rem;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Auth Body */
        .auth-body {
            padding: 1.5rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface-light);
            color: var(--text);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .input-group {
            position: relative;
        }

        .input-group .form-control {
            padding-right: 2.8rem;
        }

        .toggle-password {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 50%;
            transition: var(--transition);
            font-size: 1rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: var(--text);
            background: rgba(255,255,255,0.1);
        }

        /* Form Options */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.25rem 0;
            font-size: 0.85rem;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-check input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--primary);
        }

        .form-check label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            font-size: 0.85rem;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            width: 100%;
            min-height: 48px; /* Better touch target */
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }

        .btn-google {
            background: var(--surface-light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-google:hover {
            background: var(--surface-lighter);
            transform: translateY(-2px);
        }

        .btn-google i {
            margin-right: 0.6rem;
            font-size: 1.1rem;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before {
            margin-right: 0.75rem;
        }

        .divider:not(:empty)::after {
            margin-left: 0.75rem;
        }

        /* Auth Footer */
        .auth-footer {
            padding: 1.25rem 1.5rem;
            text-align: center;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.3rem;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Form Messages */
        .message {
            padding: 0.9rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            display: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border-left: 3px solid var(--error);
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-left: 3px solid var(--success);
        }

        /* Loader */
        .loader {
            display: inline-block;
            width: 1.1rem;
            height: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 0.6rem;
        }

        /* Animations */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-content {
            text-align: center;
            padding: 2rem;
            max-width: 300px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(67, 97, 238, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        .loading-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .loading-subtext {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Responsive Adjustments */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
                display: block;
            }
            
            .auth-card {
                max-width: 100%;
                margin-top: 1rem;
            }
            
            .auth-header {
                padding: 1.25rem 1rem 0.75rem;
            }
            
            .auth-body {
                padding: 1.25rem 1rem;
            }
            
            .auth-footer {
                padding: 1rem;
            }
            
            .form-control {
                padding: 0.8rem;
            }
            
            .btn {
                padding: 0.8rem;
            }
            
            .back-btn {
                top: 0.5rem;
                left: 0.5rem;
            }
        }

        @media (min-width: 768px) {
            .auth-card {
                max-width: 440px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Securing Connection</div>
            <div class="loading-subtext">Authenticating your session</div>
        </div>
    </div>
    
    <div id="particles-js"></div>
    
    <!-- Main Auth Card -->
    <div class="auth-card">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            <span class="back-btn-text">Back</span>
        </a>
        
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-exchange-alt"></i>
                <span>Tripple Exchange</span>
            </div>
            <p class="auth-subtitle">Welcome back! Please sign in to your account</p>
        </div>
        
        <div class="auth-body">
            <form id="loginForm" novalidate>
                <div id="errorMessage" class="message error-message" role="alert"></div>
                <div id="successMessage" class="message success-message" role="status"></div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <div class="form-check">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span id="btnText">Sign In</span>
                    <span class="loader" id="loader" style="display: none;"></span>
                </button>
                
                <div class="divider">or continue with</div>
                
                <button type="button" class="btn btn-google" id="googleBtn">
                    <i class="fab fa-google"></i> Google
                </button>
            </form>
        </div>
        
        <div class="auth-footer">
            New to Tripple Exchange? <a href="signup.html">Create account</a>
        </div>
    </div>

    <script>
        // Initialize particles.js
        document.addEventListener('DOMContentLoaded', function() {
            // Hide loading overlay after 1.5 seconds
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }, 500);
            }, 1500);
            
            // Initialize particles if available
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    particles: {
                        number: { 
                            value: 60, 
                            density: { 
                                enable: true, 
                                value_area: 800 
                            } 
                        },
                        color: { value: '#4361ee' },
                        opacity: { 
                            value: 0.2, 
                            random: true,
                            anim: { enable: true, speed: 1, opacity_min: 0.1 }
                        },
                        size: { 
                            value: 3, 
                            random: true,
                            anim: { enable: true, speed: 2, size_min: 0.1 }
                        },
                        line_linked: {
                            enable: true,
                            distance: 150,
                            color: '#4361ee',
                            opacity: 0.1,
                            width: 1
                        },
                        move: { 
                            enable: true, 
                            speed: 1,
                            direction: 'none',
                            random: true,
                            straight: false
                        }
                    },
                    interactivity: {
                        events: {
                            onhover: { 
                                enable: true, 
                                mode: 'grab',
                                parallax: { enable: true, force: 30 }
                            },
                            onclick: { enable: true, mode: 'push' }
                        },
                        modes: {
                            grab: { distance: 140, line_linked: { opacity: 0.2 } },
                            push: { particles_nb: 3 }
                        }
                    },
                    retina_detect: true
                });
            }

            // DOM elements
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Toggle password visibility
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                const icon = togglePassword.querySelector('i');
                icon.classList.toggle('fa-eye');
                icon.classList.toggle('fa-eye-slash');
                
                // Update aria-label for accessibility
                togglePassword.setAttribute('aria-label', 
                    type === 'password' ? 'Show password' : 'Hide password');
            });
            
            // Form validation
            function validateForm() {
                let isValid = true;
                hideMessages();
                
                // Email validation
                if (!emailInput.value.trim()) {
                    showError('Email address is required');
                    emailInput.focus();
                    isValid = false;
                } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim())) {
                    showError('Please enter a valid email address');
                    emailInput.focus();
                    isValid = false;
                } 
                // Password validation
                else if (!passwordInput.value) {
                    showError('Password is required');
                    passwordInput.focus();
                    isValid = false;
                } else if (passwordInput.value.length < 8) {
                    showError('Password must be at least 8 characters');
                    passwordInput.focus();
                    isValid = false;
                }
                
                return isValid;
            }
            
            function showError(message, field = null) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                
                // Highlight specific field if provided
                if (field) {
                    const fieldElement = document.getElementById(field);
                    if (fieldElement) {
                        fieldElement.style.borderColor = 'var(--error)';
                        fieldElement.focus();
                    }
                }
            }
            
            function showSuccess(message) {
                successMessage.textContent = message;
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
            }
            
            function showFieldErrors(errors) {
                // Clear previous field highlights
                [emailInput, passwordInput].forEach(input => {
                    input.style.borderColor = 'var(--border)';
                });
                
                // Show specific field errors
                if (errors.email) {
                    showError(errors.email, 'email');
                } else if (errors.password) {
                    showError(errors.password, 'password');
                } else if (errors.general) {
                    showError(errors.general);
                } else {
                    // Show first error if no specific field
                    const firstError = Object.values(errors)[0];
                    showError(firstError);
                }
            }
            
            function hideMessages() {
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
            }
            
            function setLoading(isLoading) {
                if (isLoading) {
                    loginBtn.disabled = true;
                    btnText.textContent = 'Authenticating...';
                    loader.style.display = 'inline-block';
                } else {
                    loginBtn.disabled = false;
                    btnText.textContent = 'Sign In';
                    loader.style.display = 'none';
                }
            }
            
            // Handle form submission
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                // Client-side validation
                if (!email || !password) {
                    showError('Please fill in all fields');
                    return;
                }
                
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showError('Please enter a valid email address', 'email');
                    return;
                }
                
                if (password.length < 8) {
                    showError('Password must be at least 8 characters long', 'password');
                    return;
                }
                
                setLoading(true);
                hideMessages();
                
                try {
                    // Make actual API call to login.php
                    const formData = new FormData();
                    formData.append('email', email);
                    formData.append('password', password);
                    
                    const response = await fetch('login.php', {
                        method: 'POST',
                        body: formData,
                        credentials: 'same-origin'
                    });
                    
                    // Check if response is ok
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showSuccess(result.message || 'Login successful! Redirecting to dashboard...');
                        
                        // Redirect to dashboard after short delay
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    } else {
                        // Handle specific error types
                        if (result.errors && typeof result.errors === 'object') {
                            showFieldErrors(result.errors);
                        } else {
                            showError(result.message || 'Login failed. Please check your credentials.');
                        }
                    }
                    
                } catch (error) {
                    console.error('Login error:', error);
                    
                    // More specific error messages based on error type
                    if (error.message.includes('HTTP error')) {
                        showError('Server error occurred. Please try again later.');
                    } else if (error.message.includes('NetworkError') || error.message.includes('Failed to fetch')) {
                        showError('Connection error. Please check your internet connection.');
                    } else {
                        showError('Login failed. Please check your connection and try again.');
                    }
                } finally {
                    setLoading(false);
                }
            });
            
            // Google sign in
            document.getElementById('googleBtn').addEventListener('click', () => {
                showSuccess('Redirecting to Google authentication...');
                // In a real implementation, this would trigger Google OAuth flow
            });
            
            // Real-time input validation
            emailInput.addEventListener('input', () => {
                const email = emailInput.value.trim();
                if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    emailInput.style.borderColor = 'var(--error)';
                } else {
                    emailInput.style.borderColor = 'var(--border)';
                }
            });
            
            passwordInput.addEventListener('input', () => {
                const password = passwordInput.value;
                if (password && password.length < 8) {
                    passwordInput.style.borderColor = 'var(--error)';
                } else {
                    passwordInput.style.borderColor = 'var(--border)';
                }
            });
            
            // Clear messages when user starts typing
            [emailInput, passwordInput].forEach(input => {
                input.addEventListener('input', hideMessages);
            });
            
            // Auto-focus email field on load
            setTimeout(() => {
                emailInput.focus();
            }, 100);
            
            // Handle Enter key in password field
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    loginForm.dispatchEvent(new Event('submit'));
                }
            });
            
            // Animate card on load
            setTimeout(() => {
                document.querySelector('.auth-card').style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
