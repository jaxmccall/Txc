<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Tripple Exchange</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0096FF;
            --primary-light: #4db8ff;
            --error: #ff4d4d;
            --success: #00c853;
            --bg-dark: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.95);
            --text-light: #f0f0f0;
            --text-gray: #bbbbbb;
            --input-bg: #1f2633;
            --input-border: #2e3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .reset-container {
            background: var(--card-bg);
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .logo {
            width: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--text-light);
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-light);
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 150, 255, 0.2);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--primary-light);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .success {
            background: rgba(0, 200, 83, 0.1);
            color: var(--success);
            border-left: 3px solid var(--success);
        }

        .error {
            background: rgba(255, 77, 77, 0.1);
            color: var(--error);
            border-left: 3px solid var(--error);
        }

        .login-link {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-gray);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .reset-container {
                padding: 30px 20px;
            }
        }

        /* Modern Loading Overlay Styles */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #020617;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-screen.hidden {
            display: none;
        }

        /* Abstract Geometric Background */
        .geometric-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            opacity: 0.15;
        }

        .geometric-shape {
            position: absolute;
            border: 1px solid #3b82f6;
            opacity: 0.7;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            left: -50px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: float 25s infinite linear;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            bottom: -30px;
            right: -30px;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: float 20s infinite linear reverse;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            top: 30%;
            right: 10%;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: pulse 8s infinite ease-in-out;
        }

        @keyframes float {
            0% {
                transform: rotate(0deg) translate(0, 0);
            }
            100% {
                transform: rotate(360deg) translate(50px, 50px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        /* Main Content */
        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }

        /* Abstract Loading Animation */
        .loading-animation {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 3rem;
        }

        .core {
            position: absolute;
            width: 60px;
            height: 60px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #3b82f6 0%, #00f0ff 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            animation: core-pulse 3s infinite ease-in-out;
        }

        @keyframes core-pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                box-shadow: 0 0 50px rgba(0, 240, 255, 0.7);
            }
        }

        .orbit {
            position: absolute;
            border: 2px solid transparent;
            border-radius: 50%;
            animation: orbit-rotate linear infinite;
        }

        .orbit-1 {
            width: 120px;
            height: 120px;
            top: 40px;
            left: 40px;
            border-top-color: #3b82f6;
            animation-duration: 8s;
        }

        .orbit-2 {
            width: 160px;
            height: 160px;
            top: 20px;
            left: 20px;
            border-right-color: #60a5fa;
            animation-duration: 12s;
            animation-direction: reverse;
        }

        .orbit-3 {
            width: 200px;
            height: 200px;
            top: 0;
            left: 0;
            border-bottom-color: #00f0ff;
            animation-duration: 16s;
        }

        @keyframes orbit-rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Text Elements */
        .loading-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 0.5rem;
            text-align: center;
            position: relative;
        }

        .loading-title span {
            background: linear-gradient(90deg, #3b82f6 0%, #00f0ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .loading-subtitle {
            font-size: 1rem;
            color: rgba(248, 250, 252, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 3rem;
            text-align: center;
        }

        /* Progress Indicator */
        .progress-container {
            width: 100%;
            max-width: 300px;
            height: 6px;
            background-color: rgba(59, 130, 246, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #3b82f6 0%, #00f0ff 100%);
            animation: progress 3s infinite cubic-bezier(0.65, 0, 0.35, 1);
        }

        @keyframes progress {
            0% {
                width: 0;
            }
            50% {
                width: 80%;
            }
            100% {
                width: 100%;
            }
        }

        .status-text {
            font-size: 0.9rem;
            color: rgba(248, 250, 252, 0.7);
            text-align: center;
            max-width: 300px;
        }

        .status-text:after {
            content: '...';
            animation: dots 1.5s infinite steps(4, end);
        }

        @keyframes dots {
            0%, 20% {
                content: '.';
            }
            40% {
                content: '..';
            }
            60%, 100% {
                content: '...';
            }
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .loading-title {
                font-size: 2rem;
            }
            
            .loading-subtitle {
                font-size: 0.9rem;
            }
            
            .loading-animation {
                width: 150px;
                height: 150px;
            }
            
            .orbit-1 {
                width: 90px;
                height: 90px;
                top: 30px;
                left: 30px;
            }
            
            .orbit-2 {
                width: 120px;
                height: 120px;
                top: 15px;
                left: 15px;
            }
            
            .orbit-3 {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Modern Loading Overlay -->
    <div id="loadingOverlay" class="loading-screen">
        <div class="geometric-bg">
            <div class="geometric-shape shape-1"></div>
            <div class="geometric-shape shape-2"></div>
            <div class="geometric-shape shape-3"></div>
        </div>
        
        <div class="loading-content">
            <div class="loading-animation">
                <div class="core"></div>
                <div class="orbit orbit-1"></div>
                <div class="orbit orbit-2"></div>
                <div class="orbit orbit-3"></div>
            </div>
            
            <h1 class="loading-title">
                <span>TRIPPLE EXCHANGE</span>
            </h1>
            <p class="loading-subtitle">Secure Trading Platform</p>
            
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            
            <p class="status-text">Loading password reset interface</p>
        </div>
    </div>

    <div class="reset-container">
        <img src="https://trippleexchange.com/logo.png" alt="Tripple Exchange" class="logo">
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password below</p>
        
        <form id="resetForm">
            <input type="hidden" id="resetToken">
            
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" placeholder="Enter new password" required minlength="8">
                    <i class="fas fa-eye toggle-password" id="toggleNewPassword"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8">
                    <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
                </div>
            </div>
            
            <button type="submit" class="btn" id="resetBtn">Reset Password</button>
            
            <div id="successMessage" class="message success">
                <i class="fas fa-check-circle"></i>
                <span>Password reset successfully! Redirecting to login...</span>
            </div>
            
            <div id="errorMessage" class="message error">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
        </form>
        
        <div class="login-link">
            Remember your password? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get elements
            const form = document.getElementById('resetForm');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const toggleNewPassword = document.getElementById('toggleNewPassword');
            const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
            const resetBtn = document.getElementById('resetBtn');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const resetToken = document.getElementById('resetToken');
            
            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                showError("Invalid reset link. Please request a new password reset.");
                resetBtn.disabled = true;
                return;
            }
            
            resetToken.value = token;
            
            // Toggle password visibility
            toggleNewPassword.addEventListener('click', function() {
                togglePasswordVisibility(newPasswordInput, toggleNewPassword);
            });
            
            toggleConfirmPassword.addEventListener('click', function() {
                togglePasswordVisibility(confirmPasswordInput, toggleConfirmPassword);
            });
            
            function togglePasswordVisibility(input, icon) {
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            }
            
            // Form submission
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                // Validate passwords
                if (newPassword !== confirmPassword) {
                    showError("Passwords do not match");
                    return;
                }
                
                if (newPassword.length < 8) {
                    showError("Password must be at least 8 characters");
                    return;
                }
                
                // Show loading state
                resetBtn.disabled = true;
                resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
                
                try {
                    // Call API to reset password
                    const response = await resetPassword(resetToken.value, newPassword);
                    
                    if (response.success) {
                        showSuccess();
                        resetBtn.disabled = true;
                        resetBtn.textContent = "Password Reset!";
                        
                        // Redirect to login after 3 seconds
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 3000);
                    } else {
                        showError(response.message || "Failed to reset password");
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showError("Network error. Please try again.");
                } finally {
                    if (!successMessage.style.display === 'flex') {
                        resetBtn.disabled = false;
                        resetBtn.textContent = "Reset Password";
                    }
                }
            });
            
            // API call to reset password
            async function resetPassword(token, newPassword) {
                const response = await fetch('https://trippleexchange.com/reset_password.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                
                return response.json();
            }
            
            function showError(message) {
                errorText.textContent = message;
                errorMessage.style.display = 'flex';
                successMessage.style.display = 'none';
            }
            
            function showSuccess() {
                errorMessage.style.display = 'none';
                successMessage.style.display = 'flex';
            }

            // Modern Loading overlay functions
            function showLoadingOverlay() {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) {
                    overlay.classList.remove('hidden');
                }
            }

            function hideLoadingOverlay() {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) {
                    overlay.classList.add('hidden');
                }
            }

            // Initialize page with modern loading overlay
            showLoadingOverlay();
            
            // Hide loading overlay after a short delay
            setTimeout(function() {
                hideLoadingOverlay();
            }, 3000);
        });
    </script>
</body>
</html>
